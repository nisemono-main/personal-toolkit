; This file documents the shared INI layout.
; The running program reads only %APPDATA%\loud-gate\config.ini.
; Create that real file by running loud_gate.py once, or create it manually
; with this layout and fill in the selected device fields.

[loud-gate]
version=5
input_device_index=
input_device_name=
input_device_hostapi=
output_device_index=
output_device_name=
output_device_hostapi=
threshold_db=-18.0
release_ms=150.0
lookahead_ms=25.0

[hotkeys]
; Use combinations such as F13, Ctrl+Shift+F13, Alt+F12, or Ctrl+M.
; Every combination below must be different from the others.
mute_hotkey=F13
stop_hotkey=Ctrl+Shift+F13
threshold_down_hotkey=F14
threshold_up_hotkey=Ctrl+F14
threshold_step_db=5.0
