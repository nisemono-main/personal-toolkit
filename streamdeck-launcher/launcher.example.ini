; Global launcher settings.
[global]
script_host_exe=%SystemRoot%\System32\wscript.exe
explorer_exe=%SystemRoot%\explorer.exe

; Each profile is independent. Add, remove, or duplicate a [profile:<name>]
; section without changing launcher.vbs.
[profile:steam]
kind=exe
target=%ProgramFiles(x86)%\Steam\steam.exe
args=

[profile:losslessscaling]
kind=uri
target=steam://rungameid/993090

[profile:spotify]
kind=exe
target=%APPDATA%\Spotify\Spotify.exe
args=

[profile:vivaldi]
kind=exe
target=%ProgramFiles%\Vivaldi\Application\vivaldi.exe
args=--disable-features=UseEcoQoSForBackgroundProcess

; These companion profiles assume the NVIDIA project is a sibling directory.
[profile:game]
kind=script
target=..\nvidia-display-profiles\Run-GameProfile.vbs
args=

[profile:default]
kind=script
target=..\nvidia-display-profiles\Run-DefaultProfileHidden.vbs
args=

; The remaining command-line arguments form the folder path.
[profile:explorer]
kind=dynamic-folder
